<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>evidyavruksh Virtual Tour</title>
    <script src="https://cdn.jsdelivr.net/npm/@panzoom/panzoom@4.5.1/dist/panzoom.min.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }

        /* लॉगिन स्क्रीन - अत्यंत साधी आणि प्रभावी */
        #login-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #111; display: flex; align-items: center; justify-content: center; 
            z-index: 999999; 
        }
        .login-box { background: #222; padding: 30px; border-radius: 12px; border: 1px solid #007bff; text-align: center; width: 90%; max-width: 350px; }
        .login-box input { width: 100%; padding: 15px; border-radius: 8px; border: none; margin: 15px 0; font-size: 16px; background: #333; color: white; }
        .login-box button { width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }

        /* मुख्य लेआउट */
        #main-content { display: none; height: 100vh; flex-direction: column; }
        
        .brand-bar { 
            height: 55px; background: #111; display: flex; align-items: center; 
            padding: 0 15px; border-bottom: 1px solid #333; justify-content: space-between;
            position: relative; z-index: 10001; 
        }
        .brand-bar span { color: #007bff; font-weight: bold; }
        #menu-btn { background: #007bff; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }

        .content-area { display: flex; flex: 1; position: relative; overflow: hidden; }

        /* साईडबार */
        #sidebar { 
            width: 300px; background: #111; display: flex; flex-direction: column; 
            border-right: 1px solid #333; transition: 0.3s; z-index: 10000;
        }

        /* नकाशा विभाग */
        .map-box { height: 40%; background: #000; position: relative; overflow: hidden; border-bottom: 2px solid #333; touch-action: none; }
        #panzoom-element { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        #panzoom-element img { max-width: 90%; height: auto; touch-action: none; user-select: none; }

        /* झूम बटणे */
        .zoom-ctrls { position: absolute; bottom: 10px; right: 10px; display: flex; flex-direction: column; gap: 5px; }
        .z-btn { width: 35px; height: 35px; background: #007bff; border: none; color: white; border-radius: 5px; font-size: 20px; font-weight: bold; }

        /* बटणे विभाग */
        .btn-list { flex: 1; overflow-y: auto; padding: 15px; }
        .nav-link { width: 100%; padding: 12px; margin-bottom: 10px; background: #333; color: white; border: 1px solid #444; border-radius: 6px; text-align: left; font-size: 14px; cursor: pointer; }

        /* टूर विभाग */
        #tour-container { flex: 1; background: #000; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }

        /* मोबाईल सेटिंग */
        @media (max-width: 768px) {
            #sidebar { position: absolute; left: -300px; height: 100%; width: 280px; }
            #sidebar.active { left: 0; }
            #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 9999; }
            #overlay.active { display: block; }
        }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <h2 style="margin:0; color:#007bff;">evidyavruksh</h2>
        <input type="password" id="pw" placeholder="Enter Password" autocomplete="off">
        <button onclick="check()">Unlock</button>
        <p id="msg" style="color:red; display:none; font-size:12px; margin-top:10px;">Incorrect Password!</p>
    </div>
</div>

<div id="overlay" onclick="toggleM()"></div>

<div id="main-content">
    <div class="brand-bar">
        <span>evidyavruksh 360°</span>
        <button id="menu-btn" onclick="toggleM()">Menu ☰</button>
    </div>
    
    <div class="content-area">
        <div id="sidebar">
            <div class="map-box">
                <div id="panzoom-element">
                    <img src="https://storagev2.files-vault.com/uploads/blacklabel-741/sub-account-81024/1777368810-kKqLSV5znc.webp" id="map-img">
                </div>
                <div class="zoom-ctrls">
                    <button class="z-btn" id="zin">+</button>
                    <button class="z-btn" id="zout">-</button>
                    <button class="z-btn" id="zres">↺</button>
                </div>
            </div>
            <div class="btn-list">
                <button class="nav-link" onclick="go('https://tour.panoee.net/69e7792d99ac95c94abe783f')">०१. मुख्य प्रवेश द्वार</button>
                <button class="nav-link" onclick="go('https://tour.panoee.net/69e76b32a06d09a45e1f2626')">०२. रेसिडेन्शिअल प्लॉट्स</button>
                <button class="nav-link" onclick="go('https://tour.panoee.net/69e77adb99ac9500efbe78bd')">०३. क्लब हाऊस आणि गार्डन</button>
            </div>
        </div>
        <div id="tour-container">
            <iframe id="tour-frame" src=""></iframe>
        </div>
    </div>
</div>

<script>
    const KEY = "Andmaster@2029";
    let pz;

    function check() {
        const val = document.getElementById('pw').value.trim();
        // पासवर्ड चेक करताना 'Case Sensitivity' कडे लक्ष द्या
        if (val === KEY) {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('main-content').style.display = 'flex';
            document.getElementById('tour-frame').src = "https://tour.panoee.net/69e7792d99ac95c94abe783f";
            
            // Panzoom सुरू करण्यासाठी थोडा उशीर (Delay)
            setTimeout(startPanzoom, 800);
        } else {
            document.getElementById('msg').style.display = 'block';
            document.getElementById('pw').value = "";
        }
    }

    function startPanzoom() {
        const element = document.getElementById('panzoom-element');
        // लायब्ररी लोड झाली आहे की नाही हे तपासणे
        if (typeof Panzoom !== 'undefined') {
            pz = Panzoom(element, {
                maxScale: 5,
                minScale: 1,
                contain: 'inside'
            });

            // बटणांना कमांड्स जोडणे
            document.getElementById('zin').addEventListener('click', () => pz.zoomIn());
            document.getElementById('zout').addEventListener('click', () => pz.zoomOut());
            document.getElementById('zres').addEventListener('click', () => pz.reset());
            
            // व्हील झूम
            element.parentElement.addEventListener('wheel', pz.zoomWithWheel);
        } else {
            console.error("Panzoom library not loaded!");
        }
    }

    function toggleM() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    }

    function go(url) {
        document.getElementById('tour-frame').src = url;
        if(window.innerWidth < 768) toggleM();
    }

    // Enter Key Support
    document.getElementById('pw').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') check();
    });
</script>

</body>
</html>
