<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>evidyavruksh - Zoomable Master Plan</title>
    <script src="https://unpkg.com/@panzoom/panzoom/dist/panzoom.min.js"></script>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; overflow: hidden; }
        
        /* लॉगिन स्क्रीन पूर्वीसारखीच */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #111; display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .login-box { background: #222; padding: 30px; border-radius: 10px; border: 1px solid #007bff; text-align: center; }
        .login-box input { padding: 10px; margin-top: 10px; border-radius: 5px; border: none; }
        .login-box button { padding: 10px 20px; margin-top: 15px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }

        .main-container { display: none; height: 100vh; flex-direction: column; }
        .brand-bar { height: 50px; background: #000; display: flex; align-items: center; padding: 0 20px; border-bottom: 1px solid #333; justify-content: space-between; }
        
        .content-area { display: flex; flex: 1; overflow: hidden; }
        
        /* नकाशा विभाग */
        #sidebar { width: 400px; background: #111; border-right: 1px solid #333; display: flex; flex-direction: column; position: relative; }
        .map-container { flex: 1; overflow: hidden; cursor: grab; background: #000; position: relative; border-bottom: 1px solid #333; }
        #panzoom-element { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        #panzoom-element img { max-width: 100%; height: auto; }

        /* बटणे विभाग */
        .controls { padding: 10px; background: #1a1a1a; display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        .nav-btn { padding: 8px; font-size: 12px; background: #333; color: #fff; border: 1px solid #444; border-radius: 4px; cursor: pointer; }
        .nav-btn:hover { background: #007bff; }

        #tour-box { flex: 1; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }

        /* झूम कंट्रोल बटणे */
        .zoom-tools { position: absolute; bottom: 120px; right: 10px; display: flex; flex-direction: column; gap: 5px; z-index: 5; }
        .zoom-btn { width: 35px; height: 35px; background: rgba(0,123,255,0.8); border: none; color: white; border-radius: 5px; font-size: 20px; cursor: pointer; }

        @media (max-width: 768px) {
            .content-area { flex-direction: column; }
            #sidebar { width: 100%; height: 50vh; }
            #tour-box { height: 50vh; }
        }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h2 style="color:#007bff">evidyavruksh</h2>
            <input type="password" id="pass-input" placeholder="पासवर्ड टाका">
            <br>
            <button onclick="checkPass()">Unlock Tour</button>
        </div>
    </div>

    <div class="main-container" id="main-content">
        <div class="brand-bar">
            <span>evidyavruksh | Master Plan Explorer</span>
            <span style="font-size: 12px; color: #888;">नकाशा झूम करण्यासाठी माउस किंवा पिंच वापरा</span>
        </div>
        
        <div class="content-area">
            <div id="sidebar">
                <div class="map-container" id="map-parent">
                    <div id="panzoom-element">
                        <img src="https://storagev2.files-vault.com/uploads/blacklabel-741/sub-account-81024/1777368810-kKqLSV5znc.webp" alt="Master Plan">
                    </div>
                    <div class="zoom-tools">
                        <button class="zoom-btn" id="zoom-in">+</button>
                        <button class="zoom-btn" id="zoom-out">-</button>
                        <button class="zoom-btn" id="reset">↺</button>
                    </div>
                </div>

                <div class="controls">
                    <button class="nav-btn" onclick="load('https://tour.panoee.net/69e7792d99ac95c94abe783f')">मुख्य प्रवेश</button>
                    <button class="nav-btn" onclick="load('https://tour.panoee.net/69e76b32a06d09a45e1f2626')">प्लॉटिंग एरिया</button>
                    <button class="nav-btn" onclick="load('https://tour.panoee.net/69e77adb99ac9500efbe78bd')">ॲमेनिटीज</button>
                </div>
            </div>

            <div id="tour-box">
                <iframe id="tour-iframe" src="https://tour.panoee.net/69e7792d99ac95c94abe783f" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <script>
        const SECRET_KEY = 'Admaster@2029'; // तुमचा पासवर्ड

        function checkPass() {
            if (document.getElementById('pass-input').value === SECRET_KEY) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-content').style.display = 'flex';
                initPanzoom(); // लॉगिन नंतर झूम सुरू करा
            }
        }

        function initPanzoom() {
            const elem = document.getElementById('panzoom-element');
            const panzoom = Panzoom(elem, {
                maxScale: 5,
                minScale: 1,
                contain: 'outside'
            });

            // माउस व्हीलने झूम करण्यासाठी
            elem.parentElement.addEventListener('wheel', panzoom.zoomWithWheel);

            // बटणांनी झूम करण्यासाठी
            document.getElementById('zoom-in').addEventListener('click', panzoom.zoomIn);
            document.getElementById('zoom-out').addEventListener('click', panzoom.zoomOut);
            document.getElementById('reset').addEventListener('click', panzoom.reset);
        }

        function load(url) {
            document.getElementById('tour-iframe').src = url;
        }
    </script>
</body>
</html>
