<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>evidyavruksh - 360° Interactive Tour</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; }
        
        /* पासवर्ड स्क्रीन */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; }
        .login-box { background: #222; padding: 30px; border-radius: 10px; border: 1px solid #007bff; text-align: center; }
        .login-box h2 { color: #007bff; margin-bottom: 20px; }
        .login-box input { padding: 10px; width: 200px; border-radius: 5px; border: none; outline: none; }
        .login-box button { padding: 10px 20px; margin-top: 15px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }

        /* मुख्य लेआउट */
        .main-container { display: none; height: 100vh; flex-direction: column; }
        .brand-bar { height: 60px; background: #000; display: flex; align-items: center; padding: 0 20px; border-bottom: 1px solid #333; }
        .brand-bar h1 { font-size: 20px; color: #007bff; margin: 0; }
        .content-area { display: flex; flex: 1; }
        #sidebar { width: 300px; background: #111; border-right: 1px solid #333; overflow-y: auto; padding: 15px; }
        #tour-box { flex: 1; }
        iframe { width: 100%; height: 100%; border: none; }
        
        .map-img { width: 100%; border-radius: 5px; border: 1px solid #444; }
        .nav-btn { display: block; width: 100%; padding: 12px; margin-top: 10px; background: #222; color: #fff; border: 1px solid #444; border-radius: 5px; cursor: pointer; text-align: left; }
        .nav-btn:hover { background: #007bff; border-color: #007bff; }

        @media (max-width: 768px) {
            .content-area { flex-direction: column; }
            #sidebar { width: auto; height: auto; }
            #tour-box { height: 60vh; }
        }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h2>evidyavruksh</h2>
            <p>Protected Presentation</p>
            <input type="password" id="pass-input" placeholder="पासवर्ड टाका">
            <br>
            <button onclick="checkPass()">Unlock Tour</button>
            <p id="error-msg" style="color: red; display: none; margin-top: 10px;">चुकीचा पासवर्ड!</p>
        </div>
    </div>

    <div class="main-container" id="main-content">
        <div class="brand-bar">
            <h1>evidyavruksh | 360° Virtual Tour</h1>
        </div>
        <div class="content-area">
            <div id="sidebar">
                <p>Interactive Master Plan</p>
                <img src="https://storagev2.files-vault.com/uploads/blacklabel-741/sub-account-81024/1777368810-kKqLSV5znc.webp" class="map-img">
                <button class="nav-btn" onclick="load('https://tour.panoee.net/69e7792d99ac95c94abe783f')">१. मुख्य प्रवेश</button>
                <button class="nav-btn" onclick="load('https://tour.panoee.net/69e76b32a06d09a45e1f2626')">२. प्लॉट एरिया</button>
                <button class="nav-btn" onclick="load('https://tour.panoee.net/69e77adb99ac9500efbe78bd')">३. ॲमेनिटीज</button>
            </div>
            <div id="tour-box">
                <iframe id="tour-iframe" src="https://tour.panoee.net/69e7792d99ac95c94abe783f" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <script>
        // *** पासवर्ड बदलण्यासाठी खालील 'Admin@123' बदला ***
        const SECRET_KEY = 'Admaster@2029';

        function checkPass() {
            const input = document.getElementById('pass-input').value;
            if (input === SECRET_KEY) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-content').style.display = 'flex';
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        }

        function load(url) {
            document.getElementById('tour-iframe').src = url;
            if(window.innerWidth < 768) {
                document.getElementById('tour-box').scrollIntoView({ behavior: 'smooth' });
            }
        }
    </script>
</body>
</html>
