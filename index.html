<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Plan - 360 Virtual Tour</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; background: #000; color: #fff; }
        #sidebar { width: 300px; background: #111; border-right: 1px solid #333; display: flex; flex-direction: column; }
        .header { padding: 15px; background: #222; text-align: center; border-bottom: 1px solid #333; }
        .map-section { padding: 10px; overflow-y: auto; flex: 1; }
        .map-section img { width: 100%; border: 1px solid #444; border-radius: 5px; cursor: crosshair; }
        #tour-box { flex: 1; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }
        .nav-btn { display: block; width: 100%; padding: 10px; margin-top: 10px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; text-align: center; font-weight: bold; }
        
        @media (max-width: 768px) {
            body { flex-direction: column; }
            #sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid #333; }
            #tour-box { height: 60vh; }
        }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="header">मोठा लेआउट नकाशा</div>
    <div class="map-section">
        <img src="https://storagev2.files-vault.com/uploads/blacklabel-741/sub-account-81024/1777368810-kKqLSV5znc.webp" usemap="#landmap">
        <map name="landmap">
            <area shape="rect" coords="0,0,200,200" href="javascript:void(0)" onclick="change('https://tour.panoee.net/69e7792d99ac95c94abe783f')">
            <area shape="rect" coords="201,0,500,500" href="javascript:void(0)" onclick="change('https://tour.panoee.net/69e76b32a06d09a45e1f2626')">
        </map>
        
        <button class="nav-btn" onclick="change('https://tour.panoee.net/69e7792d99ac95c94abe783f')">मुख्य प्रवेश</button>
        <button class="nav-btn" onclick="change('https://tour.panoee.net/69e76b32a06d09a45e1f2626')">प्लॉटिंग विभाग</button>
        <button class="nav-btn" onclick="change('https://tour.panoee.net/69e77adb99ac9500efbe78bd')">ॲमेनिटीज</button>
    </div>
</div>

<div id="tour-box">
    <iframe id="main-frame" src="https://tour.panoee.net/69e7792d99ac95c94abe783f" allowfullscreen allow="gyroscope; accelerometer"></iframe>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/image-map-resizer/1.0.10/js/imageMapResizer.min.js"></script>
<script>
    imageMapResize();
    function change(url) {
        document.getElementById('main-frame').src = url;
        if(window.innerWidth < 768) {
            document.getElementById('tour-box').scrollIntoView({ behavior: 'smooth' });
        }
    }
</script>

</body>
</html>
