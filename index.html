<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>evidyavruksh - Master Plan Pro</title>
    <script src="https://unpkg.com/@panzoom/panzoom/dist/panzoom.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { 
            margin: 0; 
            font-family: 'Segoe UI', sans-serif; 
            background: #000; 
            color: #fff; 
            overflow: hidden; 
            height: 100vh; 
        }
        
        /* लॉगिन स्क्रीन */
        #login-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #111; display: flex; align-items: center; justify-content: center; 
            z-index: 999999; 
        }
        .login-box { background: #222; padding: 30px; border-radius: 10px; border: 1px solid #007bff; text-align: center; width: 90%; max-width: 400px; }
        .login-box input { padding: 12px; width: 100%; border-radius: 5px; border: none; margin-top: 10px; font-size: 16px; background: #333; color: white; outline: none; }
        .login-box button { padding: 12px 25px; margin-top: 15px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; }

        .main-container { display: none; height: 100vh; flex-direction: column; position: relative; }
        
        /* टॉप ब्रँड बार */
        .brand-bar { 
            height: 55px; background: #111; 
            display: flex; align-items: center; padding: 0 15px; 
            border-bottom: 1px solid #333; font-weight: bold; color: #007bff; 
            justify-content: space-between;
            position: fixed; top: 0; left: 0; width: 100%;
            z-index: 150000; 
        }
        
        #menu-toggle { background: #007bff; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }

        .content-area { display: flex; flex: 1; margin-top: 55px; height: calc(100vh - 55px); position: relative; overflow: hidden; }
        
        /* साईडबार */
        #sidebar { 
            width: 320px; background: #111; border-right: 1px solid #333; 
            display: flex; flex-direction: column; height: 100%;
            transition: transform 0.4s ease;
            z-index: 140000;
        }

        .map-section { height: 45%; position: relative; overflow: hidden; background: #000; border-bottom: 2px solid #333; }
        #panzoom-element { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        #panzoom-element img { max-width: 95%; max-height: 95%; cursor: grab; touch-action: none; }

        .controls-section { flex: 1; overflow-y: auto; padding: 15px; background: #1a1a1a; }
        .nav-btn { display: block; width: 100%; padding: 12px; margin-bottom: 10px; background: #333; color: #fff; border: 1px solid #444; border-radius: 6px; cursor: pointer; text-align: left; }

        #tour-box { flex: 1; background: #000; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }

        .zoom-tools { position: absolute; bottom: 15px; right: 15px; display: flex; flex-direction: column; gap: 8px; z-index: 1000; }
        .zoom-btn { width: 40px; height: 40px; background: rgba(0, 123, 255, 0.9); border: none; color: white; border-radius: 8px; font-size: 20px; cursor: pointer; }

        /* मोबाईल सेटिंग्ज */
        @media (max-width: 767px) {
            #sidebar { position: absolute; left: 0; transform: translateX(-100%); width: 280px; }
            #sidebar.open { transform: translateX(0); }
            .sidebar-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 130000; }
            .sidebar-overlay.active { display: block; }
        }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h2 style="color:#007bff; margin-bottom:15px;">evidyavruksh</h2>
            <input type="password" id="pass-input" placeholder="पासवर्ड टाका" autofocus>
            <button onclick="checkPass()">Unlock Tour</button>
            <p id="error-msg" style="color: #ff4d4d; font-size: 13px; margin-top: 10px; display: none;">चुकीचा पासवर्ड!</p>
        </div>
    </div>

    <div class="sidebar-overlay" id="overlay" onclick="toggleMenu()"></div>

    <div class="main-container" id="main-content">
        <div class="brand-bar">
            <span>evidyavruksh | 360° Tour</span>
            <button id="menu-toggle" onclick="toggleMenu()">Menu ☰</button>
        </div>
        
        <div class="content-area">
            <div id="sidebar">
                <div class="map-section">
                    <div id="panzoom-element">
                        <img src="https://storagev2.files-vault.com/uploads/blacklabel-741/sub-account-81024/1777368810-kKqLSV5znc.webp" alt="Master Plan">
                    </div>
                    <div class="zoom-tools">
                        <button class="zoom-btn" onclick="pz.zoomIn()">+</button>
                        <button class="zoom-btn" onclick="pz.zoomOut()">-</button>
                        <button class="zoom-btn" onclick="pz.reset()">↺</button>
                    </div>
                </div>
                <div class="controls-section">
                    <button class="nav-btn" onclick="load('https://tour.panoee.net/69e7792d99ac95c94abe783f')">०१. मुख्य प्रवेश द्वार</button>
                    <button class="nav-btn" onclick="load('https://tour.panoee.net/69e76b32a06d09a45e1f2626')">०२. रेसिडेन्शिअल प्लॉट्स</button>
                    <button class="nav-btn" onclick="load('https://tour.panoee.net/69e77adb99ac9500efbe78bd')">०३. क्लब हाऊस आणि गार्डन</button>
                </div>
            </div>
            <div id="tour-box">
                <iframe id="tour-iframe" src="https://tour.panoee.net/69e7792d99ac95c94abe783f" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <script>
        const SECRET_KEY = "Andmaster@2029";
        let pz;

        function checkPass() {
            const userPass = document.getElementById('pass-input').value.trim();
            const errorMsg = document.getElementById('error-msg');

            console.log("Entering checkPass..."); // चेक करण्यासाठी

            if (userPass === SECRET_KEY) {
                console.log("Success!");
                document.getElementById('login-overlay').style.setProperty('display', 'none', 'important');
                document.getElementById('main-content').style.display = 'flex';
                
                // Panzoom इनीशियलाईज
                setTimeout(initPanzoom, 300);
            } else {
                errorMsg.style.display = 'block';
                document.getElementById('pass-input').value = "";
            }
        }

        function initPanzoom() {
            const elem = document.getElementById('panzoom-element');
            if (typeof Panzoom !== 'undefined') {
                pz = Panzoom(elem, {
                    maxScale: 5,
                    minScale: 1,
                    contain: 'inside'
                });
                elem.parentElement.addEventListener('wheel', pz.zoomWithWheel);
            }
        }

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('active');
        }

        function load(url) {
            document.getElementById('tour-iframe').src = url;
            if(window.innerWidth < 768) toggleMenu();
        }

        // Enter key support
        document.getElementById('pass-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') checkPass();
        });
    </script>
</body>
</html>
