<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>evidyavruksh - Master Plan Pro</title>
    <script src="https://unpkg.com/@panzoom/panzoom/dist/panzoom.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; overflow: hidden; }
        
        /* लॉगिन स्क्रीन */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #111; display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .login-box { background: #222; padding: 30px; border-radius: 10px; border: 1px solid #007bff; text-align: center; width: 90%; max-width: 400px; }
        .login-box h2 { color: #007bff; margin-top: 0; }
        .login-box input { padding: 12px; width: 100%; border-radius: 5px; border: none; margin-top: 10px; font-size: 16px; }
        .login-box button { padding: 12px 25px; margin-top: 15px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; width: 100%; font-size: 16px; }

        /* मुख्य लेआउट */
        .main-container { display: none; height: 100vh; flex-direction: column; }
        .brand-bar { height: 45px; background: #000; display: flex; align-items: center; padding: 0 15px; border-bottom: 1px solid #333; font-weight: bold; color: #007bff; }
        
        .content-area { display: flex; flex: 1; overflow: hidden; }
        
        /* साइडबार डिझाइन */
        #sidebar { 
            width: 320px; 
            background: #111; 
            border-right: 1px solid #333; 
            display: flex; 
            flex-direction: column;
            height: 100%;
        }

        /* नकाशा विभाग - उंची टॅब्लेटनुसार ॲडजस्ट होईल */
        .map-section { 
            height: 40%; 
            min-height: 200px;
            position: relative; 
            overflow: hidden; 
            background: #000;
            border-bottom: 2px solid #333;
        }
        #panzoom-element { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        #panzoom-element img { max-width: 100%; height: auto; cursor: grab; }

        /* बटणे विभाग - हा भाग आता स्वतंत्रपणे स्क्रोल होईल */
        .controls-section { 
            flex: 1; 
            overflow-y: auto; 
            padding: 10px; 
            background: #1a1a1a;
            scrollbar-width: thin;
        }
        .controls-section p { font-size: 12px; color: #888; margin: 0 0 10px 0; }

        .nav-btn { 
            display: block;
            width: 100%; 
            padding: 10px; 
            margin-bottom: 8px; 
            background: #333; 
            color: #fff; 
            border: 1px solid #444; 
            border-radius: 6px; 
            cursor: pointer;
            text-align: left;
            font-size: 13px;
            transition: 0.3s;
        }
        .nav-btn:hover { background: #007bff; border-color: #007bff; }

        /* व्हर्च्युअल टूर विभाग */
        #tour-box { flex: 1; background: #000; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }

        /* झूम बटणे */
        .zoom-tools { position: absolute; bottom: 8px; right: 8px; display: flex; flex-direction: column; gap: 4px; }
        .zoom-btn { width: 32px; height: 32px; background: rgba(0,123,255,0.9); border: none; color: white; border-radius: 4px; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* मोबाईल रिस्पॉन्सिव्हनेस (Portrait Mode) */
        @media (max-width: 767px) {
            .content-area { flex-direction: column; overflow-y: auto; }
            #sidebar { width: 100%; height: auto; border-right: none; }
            .map-section { height: 280px; }
            .controls-section { height: auto; overflow-y: visible; }
            #tour-box { height: 450px; }
        }

        /* टॅब्लेट लँडस्केपसाठी खास सुधारणा */
        @media screen and (min-width: 768px) and (max-height: 600px) {
            #sidebar { width: 280px; }
            .map-section { height: 35%; }
            .nav-btn { padding: 8px; font-size: 12px; }
        }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h2>evidyavruksh</h2>
            <p style="color: #888; font-size: 14px;">Protected Virtual Tour</p>
            <input type="password" id="pass-input" placeholder="पासवर्ड टाका" autofocus>
            <br>
            <button onclick="checkPass()">Unlock Tour</button>
            <p id="error-msg" style="color: red; display: none; margin-top: 10px; font-size: 14px;">चुकीचा पासवर्ड!</p>
        </div>
    </div>

    <div class="main-container" id="main-content">
        <div class="brand-bar">
            evidyavruksh | 360° Interactive Master Plan
        </div>
        
        <div class="content-area">
            <div id="sidebar">
                <div class="map-section" id="map-parent">
                    <div id="panzoom-element">
                        <img src="https://storagev2.files-vault.com/uploads/blacklabel-741/sub-account-81024/1777368810-kKqLSV5znc.webp" alt="Master Plan">
                    </div>
                    <div class="zoom-tools">
                        <button class="zoom-btn" id="zoom-in">+</button>
                        <button class="zoom-btn" id="zoom-out">-</button>
                        <button class="zoom-btn" id="reset">↺</button>
                    </div>
                </div>

                <div class="controls-section">
                    <p>पॉइंट निवडा (खाली स्क्रोल करा):</p>
                    <button class="nav-btn" onclick="load('https://tour.panoee.net/69e7792d99ac95c94abe783f')">०१. मुख्य प्रवेश द्वार</button>
                    <button class="nav-btn" onclick="load('https://tour.panoee.net/69e76b32a06d09a45e1f2626')">०२. रेसिडेन्शिअल प्लॉट्स</button>
                    <button class="nav-btn" onclick="load('https://tour.panoee.net/69e77adb99ac9500efbe78bd')">०३. क्लब हाऊस आणि गार्डन</button>
                    <button class="nav-btn" onclick="load('https://tour.panoee.net/69e7792d99ac95c94abe783f')">०४. अंतर्गत रस्ते</button>
                    <button class="nav-btn" onclick="load('https://tour.panoee.net/69e76b32a06d09a45e1f2626')">०५. ओपन स्पेस / पार्क</button>
                    </div>
            </div>

            <div id="tour-box">
                <iframe id="tour-iframe" src="https://tour.panoee.net/69e7792d99ac95c94abe783f" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <script>
        // तुमचा पासवर्ड येथे सेट करा
        const SECRET_KEY = 'Andmaster@2029';

        function checkPass() {
            const input = document.getElementById('pass-input').value;
            if (input === SECRET_KEY) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-content').style.display = 'flex';
                // लॉगिननंतर थोड्या वेळाने झूम सुरू करा
                setTimeout(initPanzoom, 200);
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        }

        // एंटर की दाबल्यावर लॉगिन व्हावे यासाठी
        document.getElementById('pass-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') { checkPass(); }
        });

        function initPanzoom() {
            const elem = document.getElementById('panzoom-element');
            const panzoom = Panzoom(elem, {
                maxScale: 5,
                minScale: 0.5,
                contain: 'outside',
                startScale: 1
            });

            // माउस व्हील झूम
            elem.parentElement.addEventListener('wheel', panzoom.zoomWithWheel);

            // बटण झूम
            document.getElementById('zoom-in').addEventListener('click', panzoom.zoomIn);
            document.getElementById('zoom-out').addEventListener('click', panzoom.zoomOut);
            document.getElementById('reset').addEventListener('click', panzoom.reset);
        }

        function load(url) {
            document.getElementById('tour-iframe').src = url;
            // मोबाईलवर क्लिक केल्यावर टूरकडे स्क्रोल करण्यासाठी
            if(window.innerWidth < 768) {
                document.getElementById('tour-box').scrollIntoView({ behavior: 'smooth' });
            }
        }
    </script>
</body>
</html>
