<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>evidyavruksh Virtual Tour</title>
    <script src="https://cdn.jsdelivr.net/npm/@panzoom/panzoom@4.5.1/dist/panzoom.min.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }

        /* लॉगिन स्क्रीन सुधारणा */
        #login-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #111; display: flex; align-items: center; justify-content: center; 
            z-index: 999999; 
        }
        .login-box { background: #222; padding: 30px; border-radius: 12px; border: 1px solid #007bff; text-align: center; width: 90%; max-width: 350px; }
        .login-box input { 
            width: 100%; padding: 15px; border-radius: 8px; border: none; margin: 15px 0; 
            font-size: 16px; background: #333; color: white;
            text-transform: none; /* कीबोर्ड कॅपिटल होण्यापासून रोखण्यासाठी */
        }
        .login-box button { width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        #main-content { display: none; height: 100vh; flex-direction: column; }
        
        .brand-bar { 
            height: 55px; background: #111; display: flex; align-items: center; 
            padding: 0 15px; border-bottom: 1px solid #333; justify-content: space-between;
            position: relative; z-index: 10001; 
        }
        #menu-btn { background: #007bff; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }

        .content-area { display: flex; flex: 1; position: relative; overflow: hidden; }

        /* साईडबार */
        #sidebar { 
            width: 300px; background: #111; display: flex; flex-direction: column; 
            border-right: 1px solid #333; transition: 0.3s; z-index: 10000;
        }

        /* नकाशा विभाग - झूम फिक्स */
        .map-box { height: 40%; background: #000; position: relative; overflow: hidden; border-bottom: 2px solid #333; }
        #panzoom-element { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; cursor: grab; }
        #panzoom-element img { max-width: 90%; height: auto; pointer-events: none; } /* इमेज क्लिक ब्लॉक करू नये म्हणून */

        /* झूम बटणे - हाय प्रायोरिटी */
        .zoom-ctrls { position: absolute; bottom: 15px; right: 15px; display: flex; flex-direction: column; gap: 8px; z-index: 11000; }
        .z-btn { 
            width: 45px; height: 45px; background: #007bff; border: 2px solid white; 
            color: white; border-radius: 50%; font-size: 22px; font-weight: bold; 
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }

        .btn-list { flex: 1; overflow-y: auto; padding: 15px; }
        .nav-link { width: 100%; padding: 12px; margin-bottom: 10px; background: #333; color: white; border: 1px solid #444; border-radius: 6px; text-align: left; cursor: pointer; }

        #tour-container { flex: 1; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }

        @media (max-width: 768px) {
            #sidebar { position: absolute; left: -300px; height: 100%; width: 280px; }
            #sidebar.active { left: 0; }
            #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; }
            #overlay.active { display: block; }
        }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <h2 style="margin:0; color:#007bff;">evidyavruksh</h2>
        <input type="text" id="pw" placeholder="पासवर्ड टाका" autocomplete="off" autocapitalize="none" spellcheck="false">
        <button onclick="check()">Unlock Tour</button>
        <p id="msg" style="color:red; display:none; font-size:13px; margin-top:10px;">पासवर्ड चुकीचा आहे!</p>
    </div>
</div>

<div id="overlay" onclick="toggleM()"></div>

<div id="main-content">
    <div class="brand-bar">
        <span style="color:#007bff; font-weight:bold;">evidyavruksh 360°</span>
        <button id="menu-btn" onclick="toggleM()">Menu ☰</button>
    </div>
    
    <div class="content-area">
        <div id="sidebar">
            <div class="map-box" id="map-container">
                <div id="panzoom-element">
                    <img src="https://storagev2.files-vault.com/uploads/blacklabel-741/sub-account-81024/1777368810-kKqLSV5znc.webp">
                </div>
                <div class="zoom-ctrls">
                    <button class="z-btn" onclick="zoomInNow()">+</button>
                    <button class="z-btn" onclick="zoomOutNow()">-</button>
                    <button class="z-btn" onclick="resetNow()">↺</button>
                </div>
            </div>
            <div class="btn-list">
                <button class="nav-link" onclick="go('https://tour.panoee.net/69e7792d99ac95c94abe783f')">०१. मुख्य प्रवेश द्वार</button>
                <button class="nav-link" onclick="go('https://tour.panoee.net/69e76b32a06d09a45e1f2626')">०२. रेसिडेन्शिअल प्लॉट्स</button>
                <button class="nav-link" onclick="go('https://tour.panoee.net/69e77adb99ac9500efbe78bd')">०३. क्लब हाऊस आणि गार्डन</button>
            </div>
        </div>
        <div id="tour-container">
            <iframe id="tour-frame" src=""></iframe>
        </div>
    </div>
</div>

<script>
    // सिक्युरिटी साठी की 'lowercase' मध्ये चेक करूया
    const CORRECT_KEY = "andmaster@2029"; 
    let pz;

    function check() {
        const inputField = document.getElementById('pw');
        const userVal = inputField.value.trim().toLowerCase(); // स्पेस काढली आणि लहान अक्षरात रूपांतर केले

        if (userVal === CORRECT_KEY) {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('main-content').style.display = 'flex';
            document.getElementById('tour-frame').src = "https://tour.panoee.net/69e7792d99ac95c94abe783f";
            
            // नकाशा लोड होण्यासाठी थोडा वेळ देऊन लायब्ररी सुरू करा
            setTimeout(setupPanzoom, 500);
        } else {
            document.getElementById('msg').style.display = 'block';
            inputField.value = "";
        }
    }

    function setupPanzoom() {
        const elem = document.getElementById('panzoom-element');
        if (typeof Panzoom !== 'undefined') {
            pz = Panzoom(elem, {
                maxScale: 5,
                minScale: 1,
                contain: 'inside',
                cursor: 'grab'
            });

            // माऊस व्हील झूम जोडणे
            elem.parentElement.addEventListener('wheel', pz.zoomWithWheel);
        } else {
            alert("झूम लायब्ररी लोड झाली नाही, कृपया पेज रिफ्रेश करा.");
        }
    }

    // झूम फंक्शन्स स्वतंत्रपणे लिहिली आहेत जेणेकरून ती नक्की चालतील
    function zoomInNow() { if(pz) pz.zoomIn(); }
    function zoomOutNow() { if(pz) pz.zoomOut(); }
    function resetNow() { if(pz) pz.reset(); }

    function toggleM() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    }

    function go(url) {
        document.getElementById('tour-frame').src = url;
        if(window.innerWidth < 768) toggleM();
    }

    // Enter Key Support
    document.getElementById('pw').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') check();
    });
</script>

</body>
</html>
